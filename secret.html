<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 איתור נקודות LOS נגישות — 30/40/50 ק"מ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🔒</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Arial,sans-serif; background:#0d0f13; color:#e8e6e3; height:100vh; display:flex; flex-direction:row-reverse; overflow:hidden; }
  #sidebar { width:380px; height:100vh; overflow-y:auto; background:#1a1d23; padding:14px 16px; direction:rtl; box-shadow:-4px 0 18px rgba(0,0,0,.5); z-index:1000; }
  h1 { font-size:1.1em; color:#fff; }
  .subtitle { font-size:.77em; color:#9aa0a6; margin:3px 0 13px; line-height:1.5; }
  .card { background:#242830; border-radius:10px; padding:11px 13px; margin-bottom:10px; border-right:5px solid var(--c,#888); }
  .muted { color:#9aa0a6; font-size:.82em; line-height:1.5; }
  .coords { font-family:Consolas,monospace; color:#8ab4f8; direction:ltr; }
  .searchbox { position:relative; margin-bottom:10px; }
  #obs-search { width:100%; background:#11151b; border:1px solid #3a4250; color:#fff; border-radius:8px; padding:9px 11px; font-family:inherit; font-size:.9em; }
  #obs-results { position:absolute; left:0; right:0; top:100%; margin-top:4px; background:#242830; border:1px solid #3a3f49; border-radius:8px; overflow:hidden; z-index:50; box-shadow:0 6px 18px rgba(0,0,0,.5); }
  #obs-results:empty { display:none; }
  .sresult { padding:8px 11px; font-size:.8em; color:#c5c9ce; cursor:pointer; border-bottom:1px solid #2a2f38; line-height:1.4; }
  .sresult:last-child { border-bottom:0; } .sresult:hover { background:#2d323c; color:#fff; } .sresult.msg { color:#9aa0a6; cursor:default; }
  .cbtn { width:100%; padding:10px; border:0; border-radius:9px; cursor:pointer; font-family:inherit; font-size:.9em; font-weight:700; background:linear-gradient(135deg,#1f6f3f,#2e8b57); color:#fff; }
  .cbtn:disabled { opacity:.5; cursor:default; }
  #search-progress { display:none; margin-top:10px; }
  #search-progress-label { font-size:.74em; color:#9aa0a6; margin-bottom:3px; }
  .bar { height:7px; background:#11151b; border-radius:99px; overflow:hidden; } .bar > div { height:100%; width:0; background:linear-gradient(90deg,#2e7dd1,#6fd388); transition:width .2s; }
  .presenter { background:linear-gradient(135deg,#1c2330,#222a36); border-radius:10px; padding:13px 14px; margin:12px 0; border:1px solid #2e8b57; }
  .pres-num { font-size:.78em; color:#9aa0a6; }
  .pres-band { font-size:1.4em; font-weight:800; color:#6fd388; margin:3px 0 8px; }
  .pres-rows { font-size:.85em; color:#c5c9ce; line-height:1.7; }
  .pres-rows b { color:#fff; } .pres-rows .pos { color:#6fd388; } .pres-rows .neg { color:#ff6b6b; } .pres-rows a { color:#8ab4f8; }
  .pres-nav { display:flex; gap:8px; margin-top:11px; }
  .pres-nav button { flex:1; padding:9px; border:0; border-radius:8px; cursor:pointer; font-family:inherit; font-weight:700; background:#2e7dd1; color:#fff; }
  .pres-nav button:hover { background:#3a8be0; }
  .grouphdr { font-size:.78em; color:#9aa0a6; margin:10px 0 4px; font-weight:700; }
  .litem { background:#161a20; border-radius:8px; padding:8px 11px; margin-bottom:6px; font-size:.82em; color:#c5c9ce; cursor:pointer; border-right:3px solid #2e7dd1; }
  .litem:hover { background:#1d222b; } .litem.active { background:#243044; border-right-color:#6fd388; color:#fff; }
  .footer { font-size:.7em; color:#6b7077; margin-top:12px; line-height:1.5; }
  #map { flex:1; height:100vh; }
  .leaflet-popup-content { direction:rtl; }
</style>
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<div id="sidebar">
  <button id="drawer-close" aria-label="סגור">✕</button>
  <h1>🔒 איתור נקודות LOS נגישות</h1>
  <div class="subtitle">משקיף אחד → נקודות קו ראייה במרחקי 30 / 40 / 50 ק"מ, נגישות לרכב (עד 1 ק"מ מכביש), בתוך ישראל בלבד. תורן 3 מ'. עבור ביניהן אחת-אחת.</div>

  <div class="searchbox">
    <input id="obs-search" type="text" placeholder="🔍 חפש מיקום למשקיף, או לחץ על המפה" autocomplete="off">
    <div id="obs-results"></div>
  </div>
  <div class="card" style="--c:#e74c3c">
    <b>📡 משקיף:</b> <span class="coords" id="obs-coords">לחץ על המפה למיקום</span>
  </div>
  <button class="cbtn" id="search-btn">🔎 חפש נקודות (30 / 40 / 50 ק"מ)</button>
  <div id="search-progress"><div id="search-progress-label"></div><div class="bar"><div id="search-progress-bar"></div></div></div>

  <div id="presenter"></div>
  <div id="results"></div>

  <div class="footer">נתוני גובה: AWS Terrain (~30 מ'). כבישים: OpenStreetMap. כלי תכנון — אמת בשטח. חיצים ←/→ למעבר בין נקודות.</div>
</div>
<div id="map"></div>
<button id="menu-btn" aria-label="תפריט">☰</button>
<div id="scrim"></div>

<script type="module" src="./src/secret.js"></script>
</body>
</html>
